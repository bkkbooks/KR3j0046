body:
  text: 提要坦齋通編一卷雜家類二雜考之屬臣等謹案坦齋通編一卷不著撰人名氏説郛題曰宋邢凱撰亦不詳其爵里時代所紀有淳熙中見冷世光論姓氏事在孝宗時又有慶元間高秉文命題京鏜攻中官王德謙二事及近見楊誠齋易傳語則是書成于寧宗以後又紀乾道辛夘王寧為武寧宰其家充里正則武寧人也其書多考證經史略如程大昌演繁露洪邁容齋隨筆之體如引思齊之詩辨文母太任非太娰引説苑證春秋矢魚引世説證元龍百尺樓引漢書證伏波之號不可單稱引國語證列子西方聖人不指佛引明堂位鄭注證漢書秃翁字引朱買臣張湯傳謂漢書自相矛盾引李吉甫傳謂唐書前後舛異引前漢書證豺狼當道二語不始張綱埋輪引鄒陽書證鷙鳥累百二語不始孔融薦禰衡考訂皆為精核他如論術家擇日及五音配姓之非論姚察置人事而委天數論救荒當知戢姦論羅浮山飛來峯之妄論漢高祖同罪異罰論求長生論毁淫祠論公儀休怒織帛不可訓持論皆為正大至所論子雖齊聖不先父食不應坐顔囘曽參于殿上而列其父于廡下宜别立一堂之説後世建啓聖祠竟從其議尤可謂知禮意矣是書宋志及諸家書目皆不著録其原本卷帙不可考今据散見永樂大典者逐韻掇拾編為一卷雖所存僅數十條而可取者特多焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:804c1f49f930fc1644c28710228a272ecfc04bfa6107f17a9dc01e3f02116f95
